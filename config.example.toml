version = 1

[limits]
connect_timeout_ms = 10000
command_timeout_ms = 300000
max_frame_bytes = 8388608
read_chunk_bytes = 262144
max_read_bytes = 1048576
max_write_bytes = 4194304
preview_bytes = 262144
max_output_bytes = 67108864
global_concurrency = 8
per_host_concurrency = 2
global_spool_quota_bytes = 536870912
retention_serialization_jobs = 2

# Host profiles are optional compatibility overrides. MCP paths are absolute
# and are not resolved relative to this root. Aliases are discovered from
# ~/.ssh/config when the bridge starts.
[hosts.devbox]
root = "/srv/codex-workspace"
description = "Example SSH host alias from ~/.ssh/config"
read_only = false

[hosts.devbox.limits]
per_host_concurrency = 2
