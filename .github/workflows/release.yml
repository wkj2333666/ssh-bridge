name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.91.1"
  CROSS_VERSION: "0.2.5"

jobs:
  build-main:
    name: Build bridge ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - name: Check out tagged source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pinned Rust toolchain
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal

      - name: Restore bridge target cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-rust-${{ env.RUST_TOOLCHAIN }}-bridge-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-${{ env.RUST_TOOLCHAIN }}-bridge-${{ matrix.target }}-

      - name: Install pinned cross compiler
        run: cargo +"$RUST_TOOLCHAIN" install cross --version "$CROSS_VERSION" --locked

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(cargo +"$RUST_TOOLCHAIN" metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          tag_version="${GITHUB_REF_NAME#v}"
          test "$package_version" = "$tag_version"

      - name: Cross-build bridge release binary
        env:
          TARGET: ${{ matrix.target }}
        run: cross +"$RUST_TOOLCHAIN" build --release --locked --target "$TARGET" --bin codex-ssh-bridge

      - name: Upload bridge binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p "dist/$TARGET"
          install -m 0755 "target/$TARGET/release/codex-ssh-bridge" "dist/$TARGET/codex-ssh-bridge"

      - name: Upload bridge build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: main-${{ matrix.target }}
          path: dist/${{ matrix.target }}
          if-no-files-found: error
          retention-days: 7

  build-helper:
    name: Build helper ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-musleabihf
    steps:
      - name: Check out tagged source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pinned Rust toolchain
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal

      - name: Restore helper target cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-rust-${{ env.RUST_TOOLCHAIN }}-helper-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-${{ env.RUST_TOOLCHAIN }}-helper-${{ matrix.target }}-

      - name: Install pinned cross compiler
        run: cargo +"$RUST_TOOLCHAIN" install cross --version "$CROSS_VERSION" --locked

      - name: Cross-build helper release binary
        env:
          TARGET: ${{ matrix.target }}
        run: cross +"$RUST_TOOLCHAIN" build --release --locked --target "$TARGET" --bin codex-ssh-bridge-helper

      - name: Verify helper is static when tool output is available
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          file "target/$TARGET/release/codex-ssh-bridge-helper"
          file "target/$TARGET/release/codex-ssh-bridge-helper" | grep -Eiq 'statically linked|musl'

      - name: Upload helper artifact
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p "dist/remote-helpers"
          install -m 0755 "target/$TARGET/release/codex-ssh-bridge-helper" "dist/remote-helpers/$TARGET"

      - name: Publish helper build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: helper-${{ matrix.target }}
          path: dist/remote-helpers
          if-no-files-found: error
          retention-days: 7

  package:
    name: Package ${{ matrix.target }}
    needs: [build-main, build-helper]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - name: Download bridge artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: main-*
          path: staging
          merge-multiple: false

      - name: Download helper artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: helper-*
          path: staging
          merge-multiple: false

      - name: Assemble archive and checksum
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          name="codex-ssh-bridge-${version}-${TARGET}"
          root="dist/$name"
          mkdir -p "$root/remote-helpers"
          install -m 0755 "staging/main-$TARGET/codex-ssh-bridge" "$root/codex-ssh-bridge"
          for helper in \
            x86_64-unknown-linux-musl \
            aarch64-unknown-linux-musl \
            armv7-unknown-linux-musleabihf; do
            install -m 0755 "staging/helper-$helper/$helper" "$root/remote-helpers/$helper"
          done
          tar -C "dist" -czf "dist/$name.tar.gz" "$name"
          sha256sum "dist/$name.tar.gz" > "dist/$name.tar.gz.sha256"

      - name: Upload packaged release
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: package-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packaged release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: package-*
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -n "${GITHUB_REF_NAME#v}"
          mapfile -d '' assets < <(find release-assets -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -print0)
          test "${#assets[@]}" -gt 0
          gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
