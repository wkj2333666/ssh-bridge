name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.91.1"
  CROSS_VERSION: "0.2.5"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - name: Check out tagged source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pinned Rust toolchain
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal

      - name: Install pinned cross compiler
        run: cargo +"$RUST_TOOLCHAIN" install cross --version "$CROSS_VERSION" --locked

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(cargo +"$RUST_TOOLCHAIN" metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          tag_version="${GITHUB_REF_NAME#v}"
          test "$package_version" = "$tag_version"

      - name: Cross-build release binary
        run: cross +"$RUST_TOOLCHAIN" build --release --locked --target "${{ matrix.target }}"

      - name: Package binary and checksum
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          name="codex-ssh-bridge-${version}-${TARGET}"
          mkdir -p dist
          install -m 0755 "target/${TARGET}/release/codex-ssh-bridge" "dist/${name}"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          sha256sum "dist/${name}.tar.gz" > "dist/${name}.tar.gz.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -n "${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
