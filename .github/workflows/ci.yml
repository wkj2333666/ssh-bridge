name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.91.1"

jobs:
  quality:
    name: Rust quality and tests
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Restore pinned Rust toolchain cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.rustup/toolchains/${{ env.RUST_TOOLCHAIN }}-*
          key: ${{ runner.os }}-${{ runner.arch }}-rust-toolchain-${{ env.RUST_TOOLCHAIN }}-minimal

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup component add rustfmt clippy --toolchain "$RUST_TOOLCHAIN"

      - name: Restore shared Cargo dependency cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-rust-deps-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-deps-${{ env.RUST_TOOLCHAIN }}-

      - name: Restore CI target cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: target
          key: ${{ runner.os }}-rust-target-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-target-${{ env.RUST_TOOLCHAIN }}-

      - name: Install command-line test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ripgrep

      - name: Check formatting
        run: cargo +"$RUST_TOOLCHAIN" fmt --all -- --check

      - name: Run Clippy
        run: cargo +"$RUST_TOOLCHAIN" clippy --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo +"$RUST_TOOLCHAIN" test --all-targets --all-features --locked -- --test-threads=1

      - name: Build release binary
        run: cargo +"$RUST_TOOLCHAIN" build --release --locked

      - name: Validate source package metadata
        shell: bash
        run: |
          set -euo pipefail
          test ! -e bin/codex-ssh-bridge
          test ! -e .mcp.json
          test -f .mcp.json.example
          cargo_version="$(cargo +"$RUST_TOOLCHAIN" metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          plugin_version="$(jq -r '.version' .codex-plugin/plugin.json)"
          test "$cargo_version" = "$plugin_version"
          jq -e '.mcpServers == null' .codex-plugin/plugin.json >/dev/null
          jq -e '.mcpServers["ssh-bridge"].args == ["mcp"]' .mcp.json.example >/dev/null

  diagnostics:
    name: Release profile and RSS diagnostics
    needs: quality
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Restore pinned Rust toolchain cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.rustup/toolchains/${{ env.RUST_TOOLCHAIN }}-*
          key: ${{ runner.os }}-${{ runner.arch }}-rust-toolchain-${{ env.RUST_TOOLCHAIN }}-minimal

      - name: Install pinned Rust toolchain
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal

      - name: Restore shared Cargo dependency cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-rust-deps-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-deps-${{ env.RUST_TOOLCHAIN }}-

      - name: Restore CI target cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: target
          key: ${{ runner.os }}-rust-target-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-target-${{ env.RUST_TOOLCHAIN }}-

      - name: Install command-line test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ripgrep

      - name: Collect cold/warm profile
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          CODEX_SSH_BRIDGE_PROFILE=1 \
            cargo +"$RUST_TOOLCHAIN" test --release --features profile --locked \
            --test performance_acceptance task11_release_cold_and_warm_ssh_profile \
            -- --nocapture \
            >diagnostics/profile.stdout \
            2>diagnostics/profile.jsonl

      - name: Collect release RSS diagnostics
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          cargo +"$RUST_TOOLCHAIN" test --release --locked --test mcp_tools task8_output_rss_ \
            -- --nocapture 2>&1 | tee diagnostics/rss-mcp.log
          cargo +"$RUST_TOOLCHAIN" test --release --locked --test performance_acceptance \
            task11_release_bounded_session_output_rss_fresh_child -- --nocapture \
            2>&1 | tee diagnostics/rss-session.log
          cargo +"$RUST_TOOLCHAIN" test --release --locked --test mcp_protocol task7_wide_json_rss_ \
            -- --nocapture 2>&1 | tee diagnostics/rss-json.log
          cargo +"$RUST_TOOLCHAIN" test --release --locked --lib \
            remote::run::tests::task78_base64_admission_release_rss -- --nocapture \
            2>&1 | tee diagnostics/rss-base64.log
          cargo +"$RUST_TOOLCHAIN" test --release --locked --test remote_ops \
            five_hosts_successfully_stream_forty_mib_below_rss_bound -- --nocapture \
            2>&1 | tee diagnostics/rss-fixed-operations.log

      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-diagnostics
          path: diagnostics/
          if-no-files-found: warn
          retention-days: 14
